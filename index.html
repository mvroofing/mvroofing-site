<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MV Roofing Co | Roofing Los Angeles & Riverside</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  background:#0b0b0c;
  color:#fff;
  font-family:'Inter',sans-serif;
  margin:0;
}

h1,h2,h3 {
  font-family:'Montserrat',sans-serif;
}

/* ===== TOP NAV ===== */
nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  padding: 10px 20px;
}

/* Center logo */
.nav-center {
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Hamburger */
.menu-btn {
  position:absolute;
  left:15px;
  font-size:28px;
  cursor:pointer;
}

/* Menu links */
.nav-links {
  display:none;
  flex-direction:column;
  gap:10px;
  padding-top:10px;
}

.nav-links a {
  color:white;
  text-decoration:none;
}

/* logo */
.logo {
  height:45px;
}

/* HERO */
.hero {
  height: 70vh;
  background: url('images/hero.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  position:relative;
}

.hero::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

.hero-content {
  position:relative;
  z-index:2;
}

/* GLASS BUTTONS */
.glass-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding:12px 20px;
  border-radius:12px;
  color:white;
  display:inline-block;
  margin:10px;
}

/* sections */
.section {
  padding:40px 20px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="nav-center">
    <img src="images/logo.png" class="logo" alt="MV Roofing Logo">
  </div>

  <div id="menu" class="nav-links">
    <a href="#services">Services</a>
    <a href="#estimate">Estimate</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Premium Roofing You Can Trust</h1>
    <h3>Los Angeles & Riverside County</h3>

    <a class="glass-btn" href="#estimate">Get Estimate</a>
    <a class="glass-btn" href="#contact">Call Now</a>
  </div>
</section>

<!-- SERVICES -->
<section id="services" class="section">
  <h2>Services</h2>
  <p>Roof Installation • Repair • Replacement • Inspections</p>
</section>

<!-- ESTIMATE -->
<section id="estimate" class="section">
  <h2>AI Roof Estimate</h2>
  <iframe src="https://mvroofingco-info.lovable.app/" style="width:100%;height:500px;border:none;"></iframe>
</section>

<!-- BEFORE AFTER -->
<section class="section">
  <h2>Before & After</h2>
  <img src="images/before.jpg" width="48%">
  <img src="images/after.jpg" width="48%">
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>Contact</h2>
  <p>Victor: (951) 934-8958</p>
  <p>Manuel: (323) 867-3353</p>
</section>

<script>
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}
</script>

</body>
</html>
